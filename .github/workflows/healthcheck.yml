name: Healthcheck

# Pings the status-board monitors and records samples into Neon.
# GitHub cron is best-effort (~15-min granularity, can drift) — fine for a
# portfolio uptime board. Also runnable on demand.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: healthcheck
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run healthcheck
        run: bun run healthcheck
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
